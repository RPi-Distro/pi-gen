name: Build Raspberry Pi OS Images (arm64)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.variant }} (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: lite
            skip_stages: "stage3 stage4 stage5"
            img_suffix: "-lite"
          - variant: desktop
            skip_stages: "stage5"
            img_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file git curl bc \
            gpg pigz xxd arch-test qemu-user-static kmod binfmt-support e2fsprogs

      - name: Configure build
        run: |
          cat > config <<'CONFIG'
          IMG_NAME=cardputerzero-trixie-arm64
          RELEASE=trixie
          TARGET_HOSTNAME=cardputerzero
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=raspberry
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_US.UTF-8
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=Asia/Shanghai
          CONFIG
          sed -i 's/^          //' config

          # Skip stages based on variant
          for stage in ${{ matrix.skip_stages }}; do
            touch "${stage}/SKIP" "${stage}/SKIP_IMAGES"
          done

      - name: Build image
        run: sudo ./build.sh

      - name: Find output image
        id: image
        run: |
          echo "Contents of deploy/:"
          find deploy/ -type f | sort
          # pi-gen outputs .img inside a zip, or raw .img
          FILE=$(find deploy/ -type f \( -name "*.img" -o -name "*.zip" -o -name "*.xz" \) | head -1)
          if [[ -z "$FILE" ]]; then
            echo "No image file found in deploy/"
            exit 1
          fi
          echo "Found: $FILE"
          ls -lh "$FILE"
          # If it's a .img, compress it
          if [[ "$FILE" == *.img ]]; then
            xz -9 -T0 "$FILE"
            FILE="${FILE}.xz"
          fi
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $FILE)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputerzero-${{ matrix.variant }}
          path: ${{ steps.image.outputs.path }}

      - name: Create prerelease
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.image.outputs.path }}
