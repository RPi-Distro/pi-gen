name: Build CardputerZero OS Image (arm64)

on:
  push:
    branches: [arm64]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop image (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file git curl bc \
            gpg pigz xxd arch-test qemu-user-static kmod binfmt-support e2fsprogs

      - name: Configure build
        run: |
          IMG_DATE=$(date +%Y-%m-%d)
          cat > config <<CONFIG
          IMG_NAME=cardputerzero-trixie-arm64
          IMG_FILENAME=${IMG_DATE}-cardputerzero-trixie-arm64
          ARCHIVE_FILENAME=${IMG_DATE}-cardputerzero-trixie-arm64
          RELEASE=trixie
          DEPLOY_COMPRESSION=xz
          TARGET_HOSTNAME=cardputerzero
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=raspberry
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_US.UTF-8
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=Asia/Shanghai
          CONFIG
          sed -i 's/^          //' config

          # Skip stage5 (full = desktop + recommended extras we don't need)
          touch stage5/SKIP stage5/SKIP_IMAGES

      - name: Build image
        run: sudo GITHUB_TOKEN="${GITHUB_TOKEN}" XZ_DEFAULTS="-T0" ./build.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix deploy permissions
        run: sudo chown -R $(id -u):$(id -g) deploy/

      - name: Find output image
        id: image
        run: |
          echo "Contents of deploy/:"
          find deploy/ -type f | sort
          FILE=$(find deploy/ -type f \( -name "*.img.xz" -o -name "*.zip" \) ! -name "*-lite*" | head -1)
          if [[ -z "$FILE" ]]; then
            echo "No desktop image found"
            find deploy/ -type f
            exit 1
          fi
          echo "Found: $FILE"
          ls -lh "$FILE"
          # Decompress for verification
          IMG_RAW="${FILE%.xz}"
          IMG_RAW="${IMG_RAW%.zip}"
          if [[ "$FILE" == *.xz ]]; then
            xz -dk "$FILE"
            IMG_RAW="${FILE%.xz}"
          elif [[ "$FILE" == *.zip ]]; then
            IMG_RAW=$(unzip -Z1 "$FILE" | head -1)
            unzip -o "$FILE" -d "$(dirname "$FILE")"
            IMG_RAW="$(dirname "$FILE")/$IMG_RAW"
          fi
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "raw=$IMG_RAW" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $FILE)" >> "$GITHUB_OUTPUT"

      - name: Verify image contents
        run: |
          sudo apt-get install -y e2fsprogs
          sudo ./tools/verify-image.sh "${{ steps.image.outputs.raw }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputerzero-desktop
          path: ${{ steps.image.outputs.path }}

      - name: Collect component versions
        id: components
        run: |
          set -euo pipefail
          # Launcher: extract from the deb URL we downloaded (contains release tag/commit)
          LAUNCHER_DEB_URL=$(grep -o 'https://github.com/[^"]*applaunch[^"]*_arm64\.deb' \
            <(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/CardputerZero/launcher/releases) | head -1)
          LAUNCHER_TAG=$(echo "$LAUNCHER_DEB_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "unknown")
          LAUNCHER_RELEASE=$(echo "$LAUNCHER_DEB_URL" | grep -oE 'download/[^/]+' | sed 's|download/||' || echo "unknown")

          # Kernel: read from the built image's dpkg status
          KERNEL_VER=$(sudo debugfs -R "cat etc/dpkg/info/linux-image-*.list" "${{ steps.image.outputs.raw }}" 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\+rpt' | head -1 || echo "unknown")
          [ "$KERNEL_VER" = "" ] && KERNEL_VER="unknown"

          # Driver overlay: m5stack/m5stack-linux-dtoverlays master (cloned at depth=1 during build)
          DRIVER_REPO="m5stack/m5stack-linux-dtoverlays"
          DRIVER_COMMIT=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${DRIVER_REPO}/commits/master" | jq -r '.sha[:7]' || echo "unknown")

          # U-Boot
          UBOOT_RELEASE=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/CardputerZero/u-boot/releases/latest" | jq -r '.tag_name' || echo "unknown")

          echo "launcher_version=$LAUNCHER_TAG" >> "$GITHUB_OUTPUT"
          echo "launcher_release=$LAUNCHER_RELEASE" >> "$GITHUB_OUTPUT"
          echo "kernel_version=$KERNEL_VER" >> "$GITHUB_OUTPUT"
          echo "driver_commit=$DRIVER_COMMIT" >> "$GITHUB_OUTPUT"
          echo "uboot_release=$UBOOT_RELEASE" >> "$GITHUB_OUTPUT"

          echo "Components: launcher=$LAUNCHER_TAG ($LAUNCHER_RELEASE) kernel=$KERNEL_VER driver=$DRIVER_COMMIT uboot=$UBOOT_RELEASE"

      - name: Create prerelease
        id: release
        run: |
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          gh release create "$TAG" \
            --prerelease \
            --title "$TAG" \
            --notes "Built from pi-gen commit ${GITHUB_SHA}

          **Components:**
          - Launcher (APPLaunch): ${{ steps.components.outputs.launcher_version }} (release: ${{ steps.components.outputs.launcher_release }})
          - Kernel: ${{ steps.components.outputs.kernel_version }}
          - Driver overlay: m5stack/m5stack-linux-dtoverlays @ ${{ steps.components.outputs.driver_commit }}
          - U-Boot: CardputerZero/u-boot @ ${{ steps.components.outputs.uboot_release }}" \
            "${{ steps.image.outputs.path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build-info.json to release
        run: |
          cat > /tmp/build-info.json <<EOF
          {
            "pigen_commit": "${GITHUB_SHA}",
            "launcher_version": "${{ steps.components.outputs.launcher_version }}",
            "launcher_release": "${{ steps.components.outputs.launcher_release }}",
            "kernel_version": "${{ steps.components.outputs.kernel_version }}",
            "driver_commit": "${{ steps.components.outputs.driver_commit }}",
            "uboot_release": "${{ steps.components.outputs.uboot_release }}"
          }
          EOF
          gh release upload "${{ steps.release.outputs.tag }}" /tmp/build-info.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Aliyun OSS
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: oss-cn-shenzhen.aliyuncs.com
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Copy image to OSS
        run: |
          OSS_URL="https://cardputer-zero-repo.oss-cn-shenzhen.aliyuncs.com/images/${{ steps.image.outputs.name }}"
          ossutil cp -f "${{ steps.image.outputs.path }}" \
            "oss://cardputer-zero-repo/images/${{ steps.image.outputs.name }}"
          NOTES="Built from pi-gen commit ${GITHUB_SHA}

          **Components:**
          - Launcher (APPLaunch): ${{ steps.components.outputs.launcher_version }} (release: ${{ steps.components.outputs.launcher_release }})
          - Kernel: ${{ steps.components.outputs.kernel_version }}
          - Driver overlay: m5stack/m5stack-linux-dtoverlays @ ${{ steps.components.outputs.driver_commit }}
          - U-Boot: CardputerZero/u-boot @ ${{ steps.components.outputs.uboot_release }}

          **OSS Download:** [${OSS_URL}](${OSS_URL})"
          gh release edit "${{ steps.release.outputs.tag }}" --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-lite:
    name: Verify lite build (no upload)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file git curl bc \
            gpg pigz xxd arch-test qemu-user-static kmod binfmt-support e2fsprogs

      - name: Configure lite build
        run: |
          cat > config <<'CONFIG'
          IMG_NAME=cardputerzero-trixie-arm64
          RELEASE=trixie
          DEPLOY_COMPRESSION=xz
          TARGET_HOSTNAME=cardputerzero
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=raspberry
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_US.UTF-8
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=Asia/Shanghai
          CONFIG
          sed -i 's/^          //' config
          touch stage3/SKIP stage4/SKIP stage5/SKIP
          touch stage3/SKIP_IMAGES stage4/SKIP_IMAGES stage5/SKIP_IMAGES

      - name: Build lite image
        run: sudo GITHUB_TOKEN="${GITHUB_TOKEN}" XZ_DEFAULTS="-T0" ./build.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix deploy permissions
        run: sudo chown -R $(id -u):$(id -g) deploy/

      - name: Find lite image
        id: lite
        run: |
          FILE=$(find deploy/ -name "*-lite.img.xz" | head -1)
          echo "Lite image: $FILE"
          ls -lh "$FILE"
          xz -dk "$FILE"
          IMG_RAW="${FILE%.xz}"
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "raw=$IMG_RAW" >> "$GITHUB_OUTPUT"
          echo "✓ Lite build succeeded"

      - name: Verify lite image contents
        run: |
          sudo apt-get install -y e2fsprogs
          sudo ./tools/verify-image.sh "${{ steps.lite.outputs.raw }}"

      - name: Upload artifact (90 days, no release)
        uses: actions/upload-artifact@v4
        with:
          name: cardputerzero-lite
          path: ${{ steps.lite.outputs.path }}
