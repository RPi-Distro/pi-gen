name: Publish Latest Stable to OSS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave empty for latest non-prerelease)'
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish stable image to OSS
    runs-on: ubuntu-latest

    steps:
      - name: Determine release tag
        id: release
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
            if [[ -z "$TAG" ]]; then
              echo "ERROR: No non-prerelease release found"
              exit 1
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing release: $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image from release
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          ASSET_URL=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".img.xz")) | .url')
          ASSET_NAME=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".img.xz")) | .name')
          if [[ -z "$ASSET_URL" ]]; then
            echo "ERROR: No .img.xz asset found in release $TAG"
            exit 1
          fi
          echo "Downloading: $ASSET_NAME"
          gh api "$ASSET_URL" -H "Accept: application/octet-stream" > "$ASSET_NAME"
          ls -lh "$ASSET_NAME"
          echo "name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: oss-cn-shenzhen.aliyuncs.com
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload as latest stable
        run: |
          ASSET_NAME="${{ steps.download.outputs.name }}"
          echo "Uploading $ASSET_NAME -> cardputerzero-trixie-arm64-latest.img.xz"
          ossutil cp -f "$ASSET_NAME" \
            "oss://cardputer-zero-repo/cardputerzero-trixie-arm64-latest.img.xz"
          echo "✓ Published to: https://cardputer-zero-repo.oss-cn-shenzhen.aliyuncs.com/cardputerzero-trixie-arm64-latest.img.xz"

      - name: Update os-list.json metadata
        run: |
          ASSET_NAME="${{ steps.download.outputs.name }}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          DOWNLOAD_SIZE=$(stat --format=%s "$ASSET_NAME")
          DOWNLOAD_SHA256=$(sha256sum "$ASSET_NAME" | awk '{print $1}')

          ossutil cp "oss://cardputer-zero-repo/os-list.json" os-list.json

          export RELEASE_DATE DOWNLOAD_SIZE DOWNLOAD_SHA256
          python3 <<'PY'
import json, os

release_date = os.environ["RELEASE_DATE"]
download_size = int(os.environ["DOWNLOAD_SIZE"])
download_sha256 = os.environ["DOWNLOAD_SHA256"]
target_url = "https://cardputer-zero-repo.oss-cn-shenzhen.aliyuncs.com/cardputerzero-trixie-arm64-latest.img.xz"

with open("os-list.json", "r") as f:
    data = json.load(f)

for item in data.get("os_list", []):
    if item.get("url") == target_url:
        item["release_date"] = release_date
        item["image_download_size"] = download_size
        item["image_download_sha256"] = download_sha256
        break

with open("os-list.json", "w") as f:
    json.dump(data, f, indent=2)
    f.write("\n")
PY

          echo "Updated os-list.json: date=$RELEASE_DATE size=$DOWNLOAD_SIZE sha256=$DOWNLOAD_SHA256"
          ossutil cp -f os-list.json "oss://cardputer-zero-repo/os-list.json"
          echo "✓ os-list.json updated on OSS"
