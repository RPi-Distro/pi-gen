name: Publish Latest Stable to OSS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave empty for latest release/prerelease)'
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish stable image to OSS
    runs-on: ubuntu-latest

    steps:
      - name: Determine release tag
        id: release
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            # Use the most recent release regardless of prerelease status
            TAG=$(gh api repos/${{ github.repository }}/releases --jq '.[0].tag_name')
            if [[ -z "$TAG" ]]; then
              echo "ERROR: No release found"
              exit 1
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing release: $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image from release
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          ASSET_URL=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".img.xz")) | .url')
          ASSET_NAME=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".img.xz")) | .name')
          if [[ -z "$ASSET_URL" ]]; then
            echo "ERROR: No .img.xz asset found in release $TAG"
            exit 1
          fi
          echo "Downloading: $ASSET_NAME"
          gh api "$ASSET_URL" -H "Accept: application/octet-stream" > "$ASSET_NAME"
          ls -lh "$ASSET_NAME"
          echo "name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: oss-cn-shenzhen.aliyuncs.com
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload as latest stable
        run: |
          ASSET_NAME="${{ steps.download.outputs.name }}"
          echo "Uploading $ASSET_NAME -> cardputerzero-trixie-arm64-latest.img.xz"
          ossutil cp -f "$ASSET_NAME" \
            "oss://cardputer-zero-repo/cardputerzero-trixie-arm64-latest.img.xz"
          echo "✓ Published to: https://cardputer-zero-repo.oss-cn-shenzhen.aliyuncs.com/cardputerzero-trixie-arm64-latest.img.xz"

      - name: Compute image metadata (compressed + extracted)
        id: meta
        run: |
          ASSET_NAME="${{ steps.download.outputs.name }}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          DOWNLOAD_SIZE=$(stat --format=%s "$ASSET_NAME")
          DOWNLOAD_SHA256=$(sha256sum "$ASSET_NAME" | awk '{print $1}')

          echo "Decompressing $ASSET_NAME to compute extract_size and extract_sha256..."
          IMG_NAME="${ASSET_NAME%.xz}"
          xz -dk "$ASSET_NAME"
          EXTRACT_SIZE=$(stat --format=%s "$IMG_NAME")
          EXTRACT_SHA256=$(sha256sum "$IMG_NAME" | awk '{print $1}')
          rm -f "$IMG_NAME"

          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
          echo "download_size=$DOWNLOAD_SIZE" >> "$GITHUB_OUTPUT"
          echo "download_sha256=$DOWNLOAD_SHA256" >> "$GITHUB_OUTPUT"
          echo "extract_size=$EXTRACT_SIZE" >> "$GITHUB_OUTPUT"
          echo "extract_sha256=$EXTRACT_SHA256" >> "$GITHUB_OUTPUT"

          echo "Metadata: date=$RELEASE_DATE dl_size=$DOWNLOAD_SIZE ext_size=$EXTRACT_SIZE"

      - name: Update os-list.json metadata
        run: |
          ossutil cp "oss://cardputer-zero-repo/os-list.json" os-list.json

          python3 -c "
          import json
          data = json.load(open('os-list.json'))
          target = 'https://cardputer-zero-repo.oss-cn-shenzhen.aliyuncs.com/cardputerzero-trixie-arm64-latest.img.xz'
          for item in data.get('os_list', []):
              if item.get('url') == target:
                  item['release_date'] = '${{ steps.meta.outputs.release_date }}'
                  item['image_download_size'] = ${{ steps.meta.outputs.download_size }}
                  item['image_download_sha256'] = '${{ steps.meta.outputs.download_sha256 }}'
                  item['extract_size'] = ${{ steps.meta.outputs.extract_size }}
                  item['extract_sha256'] = '${{ steps.meta.outputs.extract_sha256 }}'
                  break
          with open('os-list.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          cat os-list.json
          ossutil cp -f os-list.json "oss://cardputer-zero-repo/os-list.json"
          echo "✓ os-list.json updated on OSS (with extract_size + extract_sha256)"
