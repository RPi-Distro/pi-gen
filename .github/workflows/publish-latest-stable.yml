name: Publish Latest Stable to OSS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave empty for latest release/prerelease)'
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish image to OSS (accumulative)
    runs-on: ubuntu-latest

    steps:
      - name: Determine release tag + metadata
        id: release
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases --jq '.[0].tag_name')
            if [[ -z "$TAG" ]]; then echo "ERROR: No release found"; exit 1; fi
          fi

          # Fetch release metadata from GitHub API
          RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}")
          IS_PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
          PUBLISHED_AT=$(echo "$RELEASE_JSON" | jq -r '.published_at')
          # Use the GitHub Release published date (not today's date)
          RELEASE_DATE=$(echo "$PUBLISHED_AT" | cut -dT -f1)

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/${TAG}" >> "$GITHUB_OUTPUT"

          echo "Publishing: tag=$TAG prerelease=$IS_PRERELEASE date=$RELEASE_DATE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download image from release
        id: download
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          ASSET_URL=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".img.xz")) | .url')
          ASSET_NAME=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | endswith(".img.xz")) | .name')
          if [[ -z "$ASSET_URL" ]]; then
            echo "ERROR: No .img.xz asset found in release $TAG"
            exit 1
          fi
          echo "Downloading: $ASSET_NAME"
          gh api "$ASSET_URL" -H "Accept: application/octet-stream" > "$ASSET_NAME"
          ls -lh "$ASSET_NAME"
          echo "name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: oss-cn-shenzhen.aliyuncs.com
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload image (tagged + latest alias)
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          ASSET_NAME="${{ steps.download.outputs.name }}"
          TAGGED_NAME="cardputerzero-trixie-arm64-${TAG}.img.xz"

          echo "Uploading $ASSET_NAME -> $TAGGED_NAME"
          ossutil cp -f "$ASSET_NAME" "oss://cardputer-zero-repo/${TAGGED_NAME}"

          # Also update the "latest" alias so existing imager configs keep working
          echo "Updating latest alias..."
          ossutil cp -f "$ASSET_NAME" "oss://cardputer-zero-repo/cardputerzero-trixie-arm64-latest.img.xz"

          echo "oss_filename=$TAGGED_NAME" >> "$GITHUB_OUTPUT"
        id: upload

      - name: Compute image metadata
        id: meta
        run: |
          ASSET_NAME="${{ steps.download.outputs.name }}"
          DOWNLOAD_SIZE=$(stat --format=%s "$ASSET_NAME")
          DOWNLOAD_SHA256=$(sha256sum "$ASSET_NAME" | awk '{print $1}')

          echo "Decompressing to compute extract_size and extract_sha256..."
          IMG_NAME="${ASSET_NAME%.xz}"
          xz -dk "$ASSET_NAME"
          EXTRACT_SIZE=$(stat --format=%s "$IMG_NAME")
          EXTRACT_SHA256=$(sha256sum "$IMG_NAME" | awk '{print $1}')
          rm -f "$IMG_NAME"

          echo "download_size=$DOWNLOAD_SIZE" >> "$GITHUB_OUTPUT"
          echo "download_sha256=$DOWNLOAD_SHA256" >> "$GITHUB_OUTPUT"
          echo "extract_size=$EXTRACT_SIZE" >> "$GITHUB_OUTPUT"
          echo "extract_sha256=$EXTRACT_SHA256" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          sparse-checkout: scripts

      - name: Download build-info.json from release
        id: buildinfo
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          gh api "repos/${{ github.repository }}/releases/tags/${TAG}" \
            --jq '.assets[]|select(.name=="build-info.json")|.browser_download_url' \
            | xargs -r curl -fsSL -o build-info.json || echo '{}' > build-info.json
          cat build-info.json
          # Export fields
          echo "launcher_version=$(jq -r '.launcher_version // ""' build-info.json)" >> "$GITHUB_OUTPUT"
          echo "launcher_release=$(jq -r '.launcher_release // ""' build-info.json)" >> "$GITHUB_OUTPUT"
          echo "kernel_version=$(jq -r '.kernel_version // ""' build-info.json)" >> "$GITHUB_OUTPUT"
          echo "driver_commit=$(jq -r '.driver_commit // ""' build-info.json)" >> "$GITHUB_OUTPUT"
          echo "uboot_release=$(jq -r '.uboot_release // ""' build-info.json)" >> "$GITHUB_OUTPUT"
          echo "pigen_commit=$(jq -r '.pigen_commit // ""' build-info.json)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update os-list.json (accumulative — add version, keep history)
        run: |
          ossutil cp "oss://cardputer-zero-repo/os-list.json" os-list.json

          python3 scripts/update_os_list.py \
            --json os-list.json \
            --tag "${{ steps.release.outputs.tag }}" \
            --release-date "${{ steps.release.outputs.release_date }}" \
            --is-prerelease "${{ steps.release.outputs.is_prerelease }}" \
            --release-url "${{ steps.release.outputs.release_url }}" \
            --oss-filename "${{ steps.upload.outputs.oss_filename }}" \
            --download-size "${{ steps.meta.outputs.download_size }}" \
            --download-sha256 "${{ steps.meta.outputs.download_sha256 }}" \
            --extract-size "${{ steps.meta.outputs.extract_size }}" \
            --extract-sha256 "${{ steps.meta.outputs.extract_sha256 }}" \
            --launcher-version "${{ steps.buildinfo.outputs.launcher_version }}" \
            --launcher-release "${{ steps.buildinfo.outputs.launcher_release }}" \
            --kernel-version "${{ steps.buildinfo.outputs.kernel_version }}" \
            --driver-commit "${{ steps.buildinfo.outputs.driver_commit }}" \
            --uboot-release "${{ steps.buildinfo.outputs.uboot_release }}" \
            --pigen-commit "${{ steps.buildinfo.outputs.pigen_commit }}"

          echo "=== Updated os-list.json ==="
          python3 -c "import json; d=json.load(open('os-list.json')); [print(f\"  {e['name']} | {e['release_date']} | {e.get('tag','')}\") for e in d['os_list'] if 'CardputerZero' in e.get('name','')]"

          ossutil cp -f os-list.json "oss://cardputer-zero-repo/os-list.json"
          echo "✓ os-list.json uploaded to OSS"

          ossutil cp -f os-list.json "oss://cardputer-zero-repo/os-list.json"
          echo "✓ os-list.json uploaded to OSS"
