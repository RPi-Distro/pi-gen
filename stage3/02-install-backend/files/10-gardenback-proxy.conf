server.modules += ( "mod_proxy" )

# Reverse proxy configuration for GardenBack API
$HTTP["url"] =~ "^/api/" {
    proxy.server = ( "" => (
        ( "host" => "127.0.0.1", "port" => 8000 )
    ))
    proxy.header = (
        "map-urlpath" => ( "/api/" => "/" ),
        "upgrade" => "enable"
    )
}

# Optional: Proxy root to API docs
$HTTP["url"] =~ "^/(docs|redoc|openapi.json)" {
    proxy.server = ( "" => (
        ( "host" => "127.0.0.1", "port" => 8000 )
    ))
}
